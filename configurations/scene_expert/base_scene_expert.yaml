# SceneExpert MVP configuration
# Loaded via Hydra defaults as: scene_expert: base_scene_expert
#
# Override in ablation experiment YAMLs:
#   scene_expert.enabled: false   → disable SceneExpert entirely
#   scene_expert.mode: "harness_only" | "harness_memory" | "full" | "disabled"

# Master switch
enabled: false   # Default: off. Set true in ablation_3/4/5 experiment configs.

# Ablation mode controls which components are active:
#   "disabled"       → no-op; hooks are never built
#   "harness_only"   → TaskCompiler + Harness + GlobalPlanner; no memory
#   "harness_memory" → TaskCompiler + Harness + GlobalPlanner + FastMemory (MVP)
#   "full"           → harness_memory + LoRA model (model ID differs, behavior same)
mode: "disabled"

# Direct structured calls made by SceneExpert itself. These roles share one
# local OpenAI-compatible client, but each role has an explicit bounded budget.
structured_llm:
  roles:
    task_compiler:
      thinking_mode: "none"
      max_tokens: 768
      retry_max_tokens: 1536
      timeout_seconds: 45
      temperature: 0.1
      max_attempts: 2
      response_format: "json_schema"
    global_planner:
      thinking_mode: "none"
      max_tokens: 1024
      retry_max_tokens: 2048
      timeout_seconds: 60
      temperature: 0.1
      max_attempts: 2
      response_format: "json_schema"
    memory_writer:
      thinking_mode: "low"
      max_tokens: ${oc.env:SCENEEXPERT_MEMORY_WRITER_MAX_TOKENS,2048}
      retry_max_tokens: ${oc.env:SCENEEXPERT_MEMORY_WRITER_MAX_TOKENS,2048}
      timeout_seconds: 90
      temperature: 0.1
      max_attempts: 2
      response_format: "json_schema"

# Memory system
memory:
  # Directory for persistent memory storage (relative to project root)
  dir: "${paths.memory_dir}"
  retriever_type: "${oc.env:SCENEEXPERT_MEMORY_RETRIEVER_TYPE,lexical}"
  retrieval:
    max_success_cases: 3
    max_failure_cases: 3
    max_skills: 2
    recall_top_k: ${oc.env:SCENEEXPERT_MEMORY_RECALL_TOP_K,30}
    sim_threshold: ${oc.env:SCENEEXPERT_MEMORY_SIM_THRESHOLD,0.0}
    object_overlap_threshold: ${oc.env:SCENEEXPERT_MEMORY_OBJECT_OVERLAP_THRESHOLD,0.15}
  embedding:
    model_id: "${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_MODEL_ID,BAAI/bge-m3}"
    # Actual local loading path. Keep BGE-M3 directly under models_dir/bge-m3.
    model_dir: "${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_MODEL_DIR,${paths.models_dir}/bge-m3}"
    # Online retrieval should default to CPU to avoid competing with vLLM/OpenCLIP.
    device: "${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_DEVICE,cpu}"
    # Offline index builds may override this to cuda.
    index_device: "${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_INDEX_DEVICE,cpu}"
    batch_size: ${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_BATCH_SIZE,8}
    max_length: ${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_MAX_LENGTH,512}
    normalize: true
  index:
    backend: "${oc.env:SCENEEXPERT_MEMORY_INDEX_BACKEND,numpy}"
    # Empty means <memory.dir>/indexes. Set env only for a custom shared index dir.
    dir: "${oc.env:SCENEEXPERT_MEMORY_INDEX_DIR,}"
    require_ready: ${oc.env:SCENEEXPERT_MEMORY_INDEX_REQUIRE_READY,true}
    # If true, hybrid/vector memory builds missing numpy indexes in-process
    # before retrieval starts. This keeps ACP runs robust when JSONL memory
    # grows between experiments.
    auto_build_missing: ${oc.env:SCENEEXPERT_MEMORY_INDEX_AUTO_BUILD_MISSING,false}
  hybrid_weights:
    embedding_similarity: 0.45
    object_overlap: 0.20
    room_stage_match: 0.15
    memory_quality_score: 0.10
    recency_or_verified: 0.10

# Per-stage execution budget
stage_budget:
  # Default budget applies to all stages not explicitly listed below
  default:
    max_designer_iterations: 2
    max_repair_steps: 1
    max_planner_turns: 4
    max_designer_turns: 12
    max_critic_turns: 6
    max_wall_clock_seconds: 600
    # Preserve role-specific tails instead of allowing design work to consume
    # the whole stage deadline before visual verification and finalization.
    critic_reserve_fraction: 0.25
    final_critic_reserve_fraction: 0.10
    fallback_reserve_fraction: 0.10
    finalization_reserve_fraction: 0.05
    max_asset_requests: 4
    max_optional_object_families: 3
    max_assets_per_request: 6
    max_semantic_retries_per_family: 2
  floor_plan:
    max_designer_iterations: 2
    max_repair_steps: 1
    max_planner_turns: 8
    max_designer_turns: 12
    max_critic_turns: 4
    max_wall_clock_seconds: 600
    max_asset_requests: 4
    max_optional_object_families: 0
    max_assets_per_request: 0
    max_semantic_retries_per_family: 0
  furniture:
    max_designer_iterations: 2
    max_repair_steps: 2
    max_planner_turns: 4
    max_designer_turns: 16
    max_critic_turns: 6
    max_wall_clock_seconds: 900
    # Furniture quality gates must not inherit a nearly exhausted designer
    # deadline. Each distinct rendered candidate gets one bounded VLM window.
    critic_evaluation_max_seconds: 360
    fallback_reserve_fraction: 0.15
    max_asset_requests: 4
    max_optional_object_families: 2
    max_assets_per_request: 6
    max_semantic_retries_per_family: 2
  wall_mounted:
    max_designer_iterations: 1
    max_repair_steps: 1
    max_planner_turns: 3
    max_designer_turns: 10
    max_critic_turns: 5
    max_wall_clock_seconds: 360
    max_asset_requests: 2
    max_optional_object_families: 3
    max_assets_per_request: 4
    max_semantic_retries_per_family: 1
  ceiling_mounted:
    max_designer_iterations: 1
    max_repair_steps: 1
    max_planner_turns: 3
    max_designer_turns: 8
    max_critic_turns: 5
    max_wall_clock_seconds: 300
    max_asset_requests: 2
    max_optional_object_families: 1
    max_assets_per_request: 2
    max_semantic_retries_per_family: 1
  # Manipuland is the most error-prone stage — allow more repair attempts
  manipuland:
    max_designer_iterations: 2
    max_repair_steps: 2
    max_planner_turns: 4
    max_designer_turns: 12
    max_critic_turns: 6
    max_wall_clock_seconds: 900
    max_asset_requests: 4
    max_optional_object_families: 4
    max_assets_per_request: 6
    max_semantic_retries_per_family: 2

# Verifier pass thresholds
verifier:
  # Minimum average score (0-1) to consider a stage passing
  stage_pass_threshold: 0.6
  # Minimum overall score (0-1) to consider the full scene passing
  full_pass_threshold: 0.7
