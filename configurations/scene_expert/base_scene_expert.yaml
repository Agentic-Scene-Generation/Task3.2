# SceneExpert MVP configuration
# Loaded via Hydra defaults as: scene_expert: base_scene_expert
#
# Override in ablation experiment YAMLs:
#   scene_expert.enabled: false   → disable SceneExpert entirely
#   scene_expert.mode: "harness_only" | "harness_memory" | "full" | "disabled"

# Master switch
enabled: false   # Default: off. Set true in ablation_3/4/5 experiment configs.

# Ablation mode controls which components are active:
#   "disabled"       → no-op; hooks are never built
#   "harness_only"   → TaskCompiler + Harness + GlobalPlanner; no memory
#   "harness_memory" → TaskCompiler + Harness + GlobalPlanner + FastMemory (MVP)
#   "full"           → harness_memory + LoRA model (model ID differs, behavior same)
mode: "disabled"

# Memory system
memory:
  # Directory for persistent memory storage (relative to project root)
  dir: "${paths.memory_dir}"
  retriever_type: "${oc.env:SCENEEXPERT_MEMORY_RETRIEVER_TYPE,lexical}"
  retrieval:
    max_success_cases: 3
    max_failure_cases: 3
    max_skills: 2
    recall_top_k: ${oc.env:SCENEEXPERT_MEMORY_RECALL_TOP_K,30}
    sim_threshold: ${oc.env:SCENEEXPERT_MEMORY_SIM_THRESHOLD,0.0}
    object_overlap_threshold: ${oc.env:SCENEEXPERT_MEMORY_OBJECT_OVERLAP_THRESHOLD,0.15}
  embedding:
    model_id: "${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_MODEL_ID,BAAI/bge-m3}"
    # Actual local loading path. Keep BGE-M3 directly under models_dir/bge-m3.
    model_dir: "${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_MODEL_DIR,${paths.models_dir}/bge-m3}"
    # Online retrieval should default to CPU to avoid competing with vLLM/OpenCLIP.
    device: "${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_DEVICE,cpu}"
    # Offline index builds may override this to cuda.
    index_device: "${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_INDEX_DEVICE,cpu}"
    batch_size: ${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_BATCH_SIZE,8}
    max_length: ${oc.env:SCENEEXPERT_MEMORY_EMBEDDING_MAX_LENGTH,512}
    normalize: true
  index:
    backend: "${oc.env:SCENEEXPERT_MEMORY_INDEX_BACKEND,numpy}"
    # Empty means <memory.dir>/indexes. Set env only for a custom shared index dir.
    dir: "${oc.env:SCENEEXPERT_MEMORY_INDEX_DIR,}"
    require_ready: ${oc.env:SCENEEXPERT_MEMORY_INDEX_REQUIRE_READY,true}
  hybrid_weights:
    embedding_similarity: 0.45
    object_overlap: 0.20
    room_stage_match: 0.15
    memory_quality_score: 0.10
    recency_or_verified: 0.10

# Per-stage execution budget
stage_budget:
  # Default budget applies to all stages not explicitly listed below
  default:
    max_designer_iterations: 2
    max_repair_steps: 1
  # Manipuland is the most error-prone stage — allow more repair attempts
  manipuland:
    max_designer_iterations: 2
    max_repair_steps: 2

# Verifier pass thresholds
verifier:
  # Minimum average score (0-1) to consider a stage passing
  stage_pass_threshold: 0.6
  # Minimum overall score (0-1) to consider the full scene passing
  full_pass_threshold: 0.7
