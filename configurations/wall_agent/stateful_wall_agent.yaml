defaults:
  - base_wall_agent

# Agent configuration
agents:
  designer_agent:
    name: "designer_agent"
    max_turns: 20
    prompt: DESIGNER_AGENT

  planner_agent:
    name: "planner_agent"
    # Wall planning needs room for initial design, critique, one repair, and
    # the final summary. Eight turns can be exhausted before the planner exits
    # when tool calls and deterministic critic feedback are interleaved.
    max_turns: 20
    prompt: STATEFUL_PLANNER_AGENT

  critic_agent:
    name: "critic_agent"
    max_turns: 4
    prompt: STATEFUL_CRITIC_AGENT
